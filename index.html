<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        /* 실시간 카메라 피드 - 줌아웃 비율 시각적 동기화 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ⚠️ 아래 자바스크립트에서 CAMERA_ZOOM 비율에 맞춰 object-fit과 scale을 조절합니다 */
            object-fit: contain; 
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* 하단 UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        #capture-btn:active {
            transform: scale(0.92);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn" title="사진 촬영"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // 🌟 [줌 제어 설정 옵션] 
        // 1.0 = 기본 비율 / 0.75 = 25% 줌아웃(더 멀리 찍힘) / 0.6 = 40% 줌아웃
        // 사진을 더 멀리서 찍히게 하려면 이 값을 0.7이나 0.6으로 줄이시면 됩니다!
        const CAMERA_ZOOM = 0.75; 

        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                
                // 실시간 화면 미리보기에도 적용할 줌아웃 스케일 반영
                updateVideoTransform();
            } catch (error) {
                alert("카메라 권한을 허용해 주세요.");
            }
        }

        function updateVideoTransform() {
            // 전면 카메라 거울 반전(scaleX(-1))과 줌아웃 배열 결합
            const scaleXStr = useFrontCamera ? -CAMERA_ZOOM : CAMERA_ZOOM;
            video.style.transform = `scale(${scaleXStr}, ${CAMERA_ZOOM})`;
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 배경 클리어 (빈 여백은 검은색으로 고정)
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // 1. 전면 카메라 거울 모드 보정
            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight, xOff, yOff;

            // 정방향 세로 배치 크기 계산
            if (videoRatio > targetRatio) {
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
                xOff = 0;
                yOff = (targetHeight - rHeight) / 2;
            } else {
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
                xOff = (targetWidth - rWidth) / 2;
                yOff = 0;
            }
            
            // 2. 🌟 [핵심] 지정된 CAMERA_ZOOM 비율만큼 렌더링 영역을 중앙 기점으로 축소(줌아웃)
            const zoomedWidth = rWidth * CAMERA_ZOOM;
            const zoomedHeight = rHeight * CAMERA_ZOOM;
            
            // 축소되면서 발생하는 추가 여백을 계산하여 정중앙에 정렬
            const finalX = xOff + (rWidth - zoomedWidth) / 2;
            const finalY = yOff + (rHeight - zoomedHeight) / 2;

            // 축소된 카메라 영상 그리기
            ctx.drawImage(video, finalX, finalY, zoomedWidth, zoomedHeight);
            ctx.restore();

            // 3. 그 위에 캐릭터 프레임 온전하게 오버레이
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // 4. 다운로드
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드 실패: 일반 브라우저(크롬, 사파리)를 이용해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
