<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
        }
        /* 실시간 카메라 피드 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #capture-btn:active {
            transform: scale(0.95);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            } catch (error) {
                alert("카메라를 실행할 수 없습니다.");
            }
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 저장할 이미지 해상도를 프레임 기준으로 세로형 고정
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 검은색 배경 청소
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // ⚠️ [가로방향 데이터 감지 및 세로 회전 보정]
            // 실제 카메라 픽셀 데이터가 가로로 누워있는지 확인합니다.
            const isVideoHorizontal = video.videoWidth > video.videoHeight;
            
            let vWidth = video.videoWidth;
            let vHeight = video.videoHeight;

            if (isVideoHorizontal) {
                // 1. 캔버스 중심점을 기준으로 이동한 뒤 90도 회전 시킵니다.
                ctx.translate(targetWidth / 2, targetHeight / 2);
                ctx.rotate(90 * Math.PI / 180);
                
                // 2. 전면 카메라 거울 모드 대응 좌우 반전 위치 조정
                if (useFrontCamera) {
                    ctx.scale(1, -1); // 회전된 상태에서의 반전
                }
                
                // 3. 회전했으므로 너비와 높이 기준을 스왑(Swap)합니다.
                vWidth = video.videoHeight;
                vHeight = video.videoWidth;
                
                // 4. 중심점을 다시 드로잉용 원점으로 가상 이동
                ctx.translate(-targetHeight / 2, -targetWidth / 2);
            } else {
                // 정상적인 세로형 데이터인 경우 기존 로직 유지
                if (useFrontCamera) {
                    ctx.translate(targetWidth, 0);
                    ctx.scale(-1, 1);
                }
            }

            // [1단계] 비율 계산 (Contain 방식)
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let renderWidth, renderHeight, xOffset, yOffset;

            if (videoRatio > targetRatio) {
                renderWidth = isVideoHorizontal ? targetHeight : targetWidth;
                renderHeight = renderWidth / videoRatio;
                xOffset = 0;
                yOffset = ((isVideoHorizontal ? targetWidth : targetHeight) - renderHeight) / 2;
            } else {
                renderHeight = isVideoHorizontal ? targetWidth : targetHeight;
                renderWidth = renderHeight * videoRatio;
                xOffset = ((isVideoHorizontal ? targetHeight : targetWidth) - renderWidth) / 2;
                yOffset = 0;
            }

            // 가로 상태로 회전된 상태 혹은 일반 상태에 맞춰 정확히 바인딩하여 그리기
            if (isVideoHorizontal) {
                ctx.drawImage(video, yOffset, xOffset, renderHeight, renderWidth);
            } else {
                ctx.drawImage(video, xOffset, yOffset, renderWidth, renderHeight);
            }
            
            ctx.restore();

            // [2단계] 그 위에 동암교회 프레임을 온전하게 덮어쓰기
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 다운로드 유도
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드에 실패했습니다. 크롬이나 사파리 앱을 사용해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
