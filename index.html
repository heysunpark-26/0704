<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        /* 실시간 카메라 피드 - 미리보기도 줌아웃 반영 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* 하단 UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        #capture-btn:active {
            transform: scale(0.92);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn" title="사진 촬영"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // 🌟 [거리감 조정 옵션]
        // 1.0 = 현재 비율 (너무 가깝게 찍힘)
        // 0.75 = 약 25% 멀어짐 (추천: 적당한 시야 확보)
        // 더 멀리 찍히게 하려면 이 값을 0.7 이나 0.65 정도로 더 낮추시면 됩니다!
        const CUSTOM_ZOOM = 0.75; 

        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                
                // 미리보기 화면도 줌아웃과 거울모드 연동시킴
                updateVideoPreview();
            } catch (error) {
                alert("카메라 권한을 허용해 주세요.");
            }
        }

        function updateVideoPreview() {
            // object-fit: cover 상태에서 인위적으로 scale을 줄여 줌아웃 효과 구현
            const flipX = useFrontCamera ? -1 : 1;
            video.style.transform = `scale(${flipX * CUSTOM_ZOOM}, ${CUSTOM_ZOOM})`;
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 배경 클리어
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // 전면 카메라 거울 반전
            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight;

            // 1단계: 먼저 꽉 차는 기본 Cover 크기 구하기
            if (videoRatio > targetRatio) {
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
            } else {
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
            }

            // 2단계: 🌟 [핵심 수식] 설정한 CUSTOM_ZOOM 만큼 카메라 렌즈 상을 통째로 축소 (줌아웃)
            const finalWidth = rWidth * CUSTOM_ZOOM;
            const finalHeight = rHeight * CUSTOM_ZOOM;

            // 3단계: 축소하면서 생기는 오프셋을 정중앙으로 밀어 정렬하기
            const xOff = (targetWidth - finalWidth) / 2;
            const yOff = (targetHeight - finalHeight) / 2;
            
            // 축소 처리된 적당한 거리의 이미지 드로우
            ctx.drawImage(video, xOff, yOff, finalWidth, finalHeight);
            ctx.restore();

            // [2단계] 프레임 레이어 선명하게 입히기
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 최종 저장 다운로드
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드 실패: 일반 모바일 브라우저(크롬, 사파리)를 사용해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
