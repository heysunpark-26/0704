<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
        }
        /* 실시간 카메라 피드 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 화면을 가득 채우기 */
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #capture-btn:active {
            transform: scale(0.95);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            } catch (error) {
                alert("카메라를 실행할 수 없습니다.");
            }
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 최종 결과물 해상도 (세로형 기준 고정)
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 배경 클리어
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // 기기 렌즈 데이터 자체의 해상도 비율 판단
            const isVideoHorizontal = video.videoWidth > video.videoHeight;

            if (isVideoHorizontal) {
                // 1. 도화지(Canvas) 정중앙으로 원점을 이동합니다.
                ctx.translate(targetWidth / 2, targetHeight / 2);
                
                // 2. 가로로 누워있는 영상을 바로 세우기 위해 90도 회전합니다.
                ctx.rotate(90 * Math.PI / 180);
                
                // 3. 전면 카메라인 경우 거울 모드 반전 처리
                if (useFrontCamera) {
                    ctx.scale(1, -1);
                }

                // 4. 누운 영상 기준 해상도 매핑 계산 (Cover 방식 적용으로 좌측 쏠림 제거)
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const videoRatio = vWidth / vHeight;
                const targetRatio = targetHeight / targetWidth; // 회전했으므로 너비/높이 기준 반전

                let rWidth, rHeight;
                if (videoRatio > targetRatio) {
                    rHeight = targetWidth;
                    rWidth = targetWidth * videoRatio;
                } else {
                    rWidth = targetHeight;
                    rHeight = targetHeight / videoRatio;
                }

                // 회전된 캔버스 기준 중심을 맞춰 정중앙에 그리기
                ctx.drawImage(video, -rWidth / 2, -rHeight / 2, rWidth, rHeight);

            } else {
                // 일반적인 세로형 센서 데이터일 경우 기존 표준 정렬 적용
                if (useFrontCamera) {
                    ctx.translate(targetWidth, 0);
                    ctx.scale(-1, 1);
                }

                const videoRatio = video.videoWidth / video.videoHeight;
                const targetRatio = targetWidth / targetHeight;

                let rWidth, rHeight, xOff, yOff;
                if (videoRatio > targetRatio) {
                    rHeight = targetHeight;
                    rWidth = targetHeight * videoRatio;
                    xOff = (targetWidth - rWidth) / 2;
                    yOff = 0;
                } else {
                    rWidth = targetWidth;
                    rHeight = targetWidth / videoRatio;
                    xOff = 0;
                    yOff = (targetHeight - rHeight) / 2;
                }
                
                if (useFrontCamera) {
                    ctx.drawImage(video, -xOff - rWidth, yOff, rWidth, rHeight);
                } else {
                    ctx.drawImage(video, xOff, yOff, rWidth, rHeight);
                }
            }
            
            ctx.restore();

            // [2단계] 그 위에 완성된 동암교회 프레임을 온전한 비율로 덮어쓰기
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 다운로드 처리
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드 실패: 브라우저 환경을 확인해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
