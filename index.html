<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
        }
        /* 실시간 카메라 피드 - 화면 확대 절대 금지 설정 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 자르지 않고 전체 다 보여주기 */
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #capture-btn:active {
            transform: scale(0.95);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            } catch (error) {
                alert("카메라를 실행할 수 없습니다.");
            }
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 결과물 저장 해상도 (세로형 프레임 원본 해상도 기준)
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 배경 클리어 (검은색 배경 채우기)
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // 전면 카메라 좌우 거울반전 보정
            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            // 회전 로직을 걷어내고 정방향 매핑을 진행합니다.
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight, xOff, yOff;

            // 영상을 크롭 없이 축소하여 넣는 정방향 세로 Contain 연산
            if (videoRatio > targetRatio) {
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
                xOff = 0;
                yOff = (targetHeight - rHeight) / 2;
            } else {
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
                xOff = (targetWidth - rWidth) / 2;
                yOff = 0;
            }
            
            // 이미지 그리기
            ctx.drawImage(video, xOff, yOff, rWidth, rHeight);
            ctx.restore();

            // [2단계] 그 위에 PNG 프레임을 통째로 정확히 덮어쓰기
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 이미지 저장 및 다운로드
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드에 실패했습니다. 크롬이나 사파리 브라우저를 이용해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
