<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* 화면 비율 컨테이너 (스마트폰 최적화 세로형 뷰포트) */
        #app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 888px; 
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        /* 실시간 카메라 피드 - 빈틈없이 꽉 채우도록 설정 */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 예시 사진처럼 여백 없이 꽉 채우기 */
            z-index: 1;
            background-color: #000;
        }
        /* PNG 프레임 오버레이 */
        #frame-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            pointer-events: none;
            z-index: 2;
        }
        /* 하단 UI 컨트롤러 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 40px;
            z-index: 3;
        }
        #capture-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #fff;
            border: 5px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        #capture-btn:active {
            transform: scale(0.92);
        }
        #switch-btn {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn" title="사진 촬영"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
            } catch (error) {
                alert("카메라 권한을 허용해 주세요.");
            }
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 결과물 저장 해상도 (프레임 원본 기준 1:1 세로형 박스 고정)
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;

            // 도화지 초기화
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);

            ctx.save();

            // 전면 카메라 거울 모드 좌우 대칭 보정
            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight, xOff, yOff;

            // 🌟 [핵심 수정: 세로 꽉 찬 Cover 렌더링 공식] 
            // 찌그러짐 없이 예시 이미지처럼 위아래/좌우 여백을 완전히 메우며 적당한 시야 확보
            if (videoRatio > targetRatio) {
                // 영상이 프레임보다 가로로 더 넓은 경우 -> 세로를 꽉 채우고 좌우를 균등 분할 크롭
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
                xOff = (targetWidth - rWidth) / 2;
                yOff = 0;
            } else {
                // 영상이 프레임보다 세로로 더 긴 경우 -> 가로를 꽉 채우고 위아래를 균등 분할 크롭
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
                xOff = 0;
                yOff = (targetHeight - rHeight) / 2;
            }
            
            // 이미지 드로잉
            ctx.drawImage(video, xOff, yOff, rWidth, rHeight);
            ctx.restore();

            // [2단계] 그 위에 투명 PNG 캐릭터 디자인 프레임을 온전한 해상도로 덮어쓰기
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            // [3단계] 최종 다운로드 처리
            try {
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `faith_nation_${Date.now()}.png`;
                link.href = dataUrl;
                link.click();
            } catch (e) {
                alert("다운로드 실패: 일반 모바일 브라우저(크롬, 사파리)를 이용해 주세요.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
