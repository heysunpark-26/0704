<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 앱 컨테이너: 스마트폰 전체 화면을 꽉 채우도록 설정 */
        #app-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            max-width: 500px; 
            max-height: 100vh; 
            background-color: #000; 
            overflow: hidden; 
        }

        /* 🌟 검은 여백을 무조건 파괴하는 100% 꽉 찬 풀스크린 배치 */
        #video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 무조건 빈틈없이 화면을 메웁니다 */
            transform-origin: center center;
        }

        /* 투명 PNG 프레임 */
        #frame-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 2; 
            object-fit: fill; 
        }

        /* 하단 UI 컨트롤러 */
        #controls { 
            position: absolute; 
            bottom: 40px; 
            left: 0; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding: 0 40px; 
            z-index: 3; 
        }
        #capture-btn { 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            background-color: #fff; 
            border: 5px solid rgba(255, 255, 255, 0.4); 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #switch-btn { 
            background: rgba(0, 0, 0, 0.6); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            padding: 10px 20px; 
            border-radius: 20px; 
            font-size: 14px; 
            cursor: pointer; 
            backdrop-filter: blur(5px);
        }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="video-wrapper">
            <video id="video" autoplay playsinline></video>
        </div>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            
            // 🌟 [해상도 및 시야각 대폭 확장] 
            // 4K급 높은 사양과 초광각 렌즈 유도를 통해 자연스럽게 줌아웃된 효과를 만듭니다.
            const constraints = {
                video: { 
                    facingMode: useFrontCamera ? "user" : "environment", 
                    width: { ideal: 3840, min: 1920 }, 
                    height: { ideal: 2160, min: 1080 } 
                },
                audio: false
            };
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                applyLiveTransform();
            } catch (error) { alert("카메라 권한을 허용해 주세요."); }
        }

        // 미리보기 거울모드 처리 (인위적인 scale 축소를 제거하여 여백 방지)
        function applyLiveTransform() {
            video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            
            // 프레임 이미지 원본 해상도와 1:1 매칭 (고해상도 유지)
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            canvas.width = targetWidth; canvas.height = targetHeight;

            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            ctx.save();

            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight, xOff, yOff;
            
            // 화면과 완전히 똑같은 '여백 없는 Cover' 비율로 최종 이미지 합성
            if (videoRatio > targetRatio) {
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
                xOff = (targetWidth - rWidth) / 2;
                yOff = 0;
            } else {
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
                xOff = 0;
                yOff = (targetHeight - rHeight) / 2;
            }

            ctx.drawImage(video, xOff, yOff, rWidth, rHeight);
            ctx.restore();
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            try {
                const link = document.createElement('a');
                link.download = `faith_cruise_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert("크롬이나 사파리 앱으로 접속하시면 바로 저장할 수 있습니다.");
            }
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
