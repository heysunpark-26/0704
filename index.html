<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>믿음의 항해 카메라 (셀카/후면 줌 최적화)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #app-container { position: relative; width: 100vw; height: 100vh; max-width: 500px; max-height: 888px; background-color: #000; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #frame-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
        #controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 40px; z-index: 3; }
        #capture-btn { width: 75px; height: 75px; border-radius: 50%; background-color: #fff; border: 5px solid rgba(255, 255, 255, 0.4); cursor: pointer; }
        #switch-btn { background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <video id="video" autoplay playsinline></video>
        <img id="frame-overlay" src="frame.png" alt="프레임">
        <div id="controls">
            <button id="switch-btn">🔄 전환</button>
            <button id="capture-btn"></button>
            <div style="width: 65px;"></div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        // 🌟 [줌 설정] 여기서 수치를 조정하세요!
        // 1.0 = 최대 시야(가까움) / 0.6 = 넓은 시야(줌아웃)
        const ZOOM_SETTINGS = {
            front: 0.8,  // 셀카 모드 줌아웃 (너무 멀지 않게 조정)
            back: 0.65   // 후면 모드 줌아웃 (시원하게 넓게 찍히도록)
        };

        const video = document.getElementById('video');
        const frame = document.getElementById('frame-overlay');
        const captureBtn = document.getElementById('capture-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');

        let currentStream = null;
        let useFrontCamera = true;

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            
            const constraints = {
                video: { facingMode: useFrontCamera ? "user" : "environment", width: { ideal: 1080 }, height: { ideal: 1920 } },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                updateVideoPreview();
            } catch (error) { alert("카메라 권한을 허용해 주세요."); }
        }

        function updateVideoPreview() {
            const currentZoom = useFrontCamera ? ZOOM_SETTINGS.front : ZOOM_SETTINGS.back;
            const flipX = useFrontCamera ? -1 : 1;
            video.style.transform = `scale(${flipX * currentZoom}, ${currentZoom})`;
        }

        switchBtn.addEventListener('click', () => {
            useFrontCamera = !useFrontCamera;
            startCamera();
        });

        captureBtn.addEventListener('click', () => {
            const ctx = canvas.getContext('2d');
            const targetWidth = frame.naturalWidth || 1080;
            const targetHeight = frame.naturalHeight || 1920;
            canvas.width = targetWidth; canvas.height = targetHeight;

            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            ctx.save();

            if (useFrontCamera) {
                ctx.translate(targetWidth, 0);
                ctx.scale(-1, 1);
            }

            // 현재 카메라 모드에 맞는 줌 값 선택
            const currentZoom = useFrontCamera ? ZOOM_SETTINGS.front : ZOOM_SETTINGS.back;

            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;

            let rWidth, rHeight;
            if (videoRatio > targetRatio) {
                rHeight = targetHeight;
                rWidth = targetHeight * videoRatio;
            } else {
                rWidth = targetWidth;
                rHeight = targetWidth / videoRatio;
            }

            const finalWidth = rWidth * currentZoom;
            const finalHeight = rHeight * currentZoom;
            const xOff = (targetWidth - finalWidth) / 2;
            const yOff = (targetHeight - finalHeight) / 2;
            
            ctx.drawImage(video, xOff, yOff, finalWidth, finalHeight);
            ctx.restore();
            ctx.drawImage(frame, 0, 0, targetWidth, targetHeight);

            const link = document.createElement('a');
            link.download = `photo_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
